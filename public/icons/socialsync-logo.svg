<svg width="250" height="70" viewBox="0 0 250 70" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .socialsync-text {
        font-family: 'cursive', 'Brush Script MT', sans-serif;
        font-size: 40px;
        fill: #A020F0;
      }
      .socialsync-icon {
        fill: none;
        stroke: #A020F0;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .socialsync-icon-fill {
        fill: #A020F0;
        stroke: none;
      }
    </style>
  </defs>

  <!-- Icon -->
  <g transform="translate(30, 35)" class="socialsync-icon">
    <!-- Central Circle -->
    <circle class="socialsync-icon-fill" cx="0" cy="0" r="4"/>

    <!-- Outer Circles -->
    <g class="socialsync-icon-fill">
      <circle cx="-15" cy="0" r="2"/>
      <circle cx="15" cy="0" r="2"/>
      <circle cx="0" cy="-15" r="2"/>
      <circle cx="0" cy="15" r="2"/>
      <circle cx="-10.6" cy="-10.6" r="2"/>
      <circle cx="10.6" cy="-10.6" r="2"/>
      <circle cx="-10.6" cy="10.6" r="2"/>
      <circle cx="10.6" cy="10.6" r="2"/>
    </g>
    <g class="socialsync-icon">
      <line x1="0" y1="0" x2="-15" y2="0" />
      <line x1="0" y1="0" x2="15" y2="0" />
      <line x1="0" y1="0" x2="0" y2="-15" />
      <line x1="0" y1="0" x2="0" y2="15" />
      <line x1="0" y1="0" x2="-10.6" y2="-10.6" />
      <line x1="0" y1="0" x2="10.6" y2="-10.6" />
      <line x1="0" y1="0" x2="-10.6" y2="10.6" />
      <line x1="0" y1="0" x2="10.6" y2="10.6" />
    </g>
  </g>

  <!-- Wordmark -->
  <text x="75" y="50" class="socialsync-text">SocialSync</text>
</svg>
