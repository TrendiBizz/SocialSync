# 1. Ensure the workflows folder exists
New-Item -ItemType Directory -Force -Path .github\workflows

# 2. Write out the GitHub Actions workflow
Set-Content -Path .github\workflows\firebase-deploy.yml -Value @'
name: Firebase Deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build & Deploy to Firebase Hosting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Use Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Cache npm modules
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_SOCIALSYNC }}
          channelId: live
          projectId: socialsync-5e4eb
'@

# 3. Commit & push to GitHub
git add .github\workflows\firebase-deploy.yml
git commit -m "ci: add/update GitHub Actions workflow for Firebase deploy"
git push origin main
